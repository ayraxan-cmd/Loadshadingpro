<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাদেশ লোডশেডিং ম্যাপ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Hind Siliguri', sans-serif; background: #0f172a;}
        #map {height: 60vh; width: 100%; background: #1e293b; z-index: 1;}
        .controls {padding: 15px; background: #1e293b; text-align: center;}
        h1 {color: #fff; font-size: 20px; margin-bottom: 10px;}
        .btn {padding: 15px 10px; font-size: 16px; border-radius: 10px; border: none; margin: 5px; width: 45%; font-weight: bold; cursor: pointer;}
        .off {background: #ef4444; color: white;}
        .on {background: #22c55e; color: white;}
        #status {color: #fbbf24; margin-top: 10px; font-size: 14px; min-height: 20px;}
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <h1>⚡ লাইভ লোডশেডিং ম্যাপ</h1>
        <button class="btn off" onclick="reportLoadShedding('off')">কারেন্ট নাই</button>
        <button class="btn on" onclick="reportLoadShedding('on')">কারেন্ট আসছে</button>
        <div id="status">ম্যাপ লোড হচ্ছে...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://irwvbnlorfxuzhomcyew.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_L9XmUuSgcg9Ix7eyMHBndw_7iLZStBD'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const statusDiv = document.getElementById('status');
        
        let map;
        let markers;

        // পেজ লোড হলে ম্যাপ চালু হবে
        window.onload = function() {
            try {
                map = L.map('map').setView([23.8103, 90.4125], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                markers = L.layerGroup().addTo(map);
                statusDiv.innerText = 'ম্যাপ লোড হইছে ✅ ডাটা আনতেছি...';
                loadReports();
            } catch (e) {
                statusDiv.innerText = 'ম্যাপ এরর: ' + e.message;
            }
        }

        async function reportLoadShedding(status) {
            statusDiv.innerText = 'লোকেশন নিচ্ছি...';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await supabase.from('reports').insert([{
                    status: status, lat: pos.coords.latitude, lng: pos.coords.longitude,
                }]);
                if(error) statusDiv.innerText = 'DB Insert এরর: ' + error.message;
                else { statusDiv.innerText = 'ধন্যবাদ! রিপোর্ট যোগ হয়েছে ✅'; loadReports(); }
            }, () => { statusDiv.innerText = 'লোকেশন পারমিশন দেন নাই'; });
        }

        async function loadReports() {
            const oneHourAgo = new Date(Date.now() - 60*60*1000).toISOString();
            const { data, error } = await supabase.from('reports').select('*').gte('created_at', oneHourAgo);
            if(error) { statusDiv.innerText = 'DB Read এরর: ' + error.message; return; }
            markers.clearLayers();
            data.forEach(report => {
                const color = report.status === 'off' ? '#ef4444' : '#22c55e';
                L.circleMarker([report.lat, report.lng], {radius: 8, fillColor: color, color: '#fff', weight: 1, fillOpacity: 0.8}).addTo(markers);
            });
            statusDiv.innerText = `লাস্ট ১ ঘন্টায় ${data.length} টা রিপোর্ট`;
        }
        setInterval(loadReports, 30000);
    </script>
</body>
</html>
