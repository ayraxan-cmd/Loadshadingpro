        .on {background: #22c55e; color: white;}
        #status {color: #fbbf24; margin-top: 8px; font-size: 13px; min-height: 18px;}
        select {width: 96%; padding: 10px; margin: 6px 0; border-radius: 8px; border: none; font-size: 15px; background: #334155; color: white;}
    </style>
</head>

        <button class="btn off" onclick="reportLoadShedding('off')">কারেন্ট নাই</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const SUPABASE_URL = 'https://irwvbnlorfxuzhomcyew.supabase.co'; 
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlyd3ZibmxvcmZ4dXpob21jeWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDAyMDMsImV4cCI6MjA5MzE3NjIwM30.4MvaM2e_KgdSu_WfQ_lwSxkBkYiXZv7c1B0NWkbEup8'; 
            
            const statusDiv = document.getElementById('status');
            const districtSelect = document.getElementById('districtSelect');
            let supabase, map, markers, allReports = [];

            const bdBounds = L.latLngBounds([20.5, 88.0], [26.7, 92.7]);

            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            } catch(e) {
                statusDiv.innerText = 'DB এরর: ' + e.message;
                return;
            }

            try {
                map = L.map('map', {
                    center: [23.685, 90.3563], zoom: 7, minZoom: 6, maxZoom: 18,
                    maxBounds: bdBounds, maxBoundsViscosity: 1.0
                });
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markers = L.layerGroup().addTo(map);
                statusDiv.innerText = 'ম্যাপ রেডি ✅ রিপোর্ট আনতেছি...';
                loadReports();
            } catch (e) {
                statusDiv.innerText = 'ম্যাপ এরর: ' + e.message;
                return;
            }

            // GPS থেকে জেলা বের করার ফাংশন
            async function getDistrictFromCoords(lat, lng) {
                try {
                    statusDiv.innerText = 'জেলা খুঁজতেছি...';
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=bn`);
                    const data = await response.json();
                    // state = বিভাগ, county = জেলা
                    let district = data.address.county || data.address.state_district || data.address.city || 'Unknown';
                    // "District" শব্দ বাদ দিব
                    district = district.replace(' District', '').replace(' জেলা', '');
                    return district;
                } catch (e) {
                    return 'Unknown';
                }
            }

            window.reportLoadShedding = async function(status) {
                statusDiv.innerText = 'লোকেশন খুঁজতেছি...';
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    if(!bdBounds.contains([lat, lng])) {
                        statusDiv.innerText = 'দুঃখিত, শুধু বাংলাদেশের জন্য';
                        return;
                    }
                    
                    // অটো জেলা বের করতেছি
                    const district = await getDistrictFromCoords(lat, lng);
                    statusDiv.innerText = `${district} জেলা পাইছি! DB তে পাঠাচ্ছি...`;
                    
                    const { error } = await supabase.from('reports').insert([{
                        status: status, 
                        lat: lat, 
                        lng: lng,
                        district: district
                    }]);
                    if(error) statusDiv.innerText = 'DB এরর: ' + error.message;
                    else { statusDiv.innerText = `${district} থেকে রিপোর্ট যোগ হয়েছে ✅`; loadReports(); }
                }, (err) => { 
                    if(err.code == 1) statusDiv.innerText = 'লোকেশন ব্লক করা। 🔒 Allow দিন';
                    else if(err.code == 2) statusDiv.innerText = 'GPS পাচ্ছে না';
                    else statusDiv.innerText = 'লোকেশন এরর: ' + err.message; 
                }, {enableHighAccuracy: true, timeout: 15000});
            }

            async function loadReports() {
                const { data, error } = await supabase.from('reports').select('*').gte('created_at', new Date(Date.now() - 60*60*1000).toISOString());
                if(error) { statusDiv.innerText = 'DB Read এরর: ' + error.message; return; }
                allReports = data;
                filterDistrict();
            }

            window.filterDistrict = function() {
                const selected = districtSelect.value;
                markers.clearLayers();
                const filtered = selected === 'all' ? allReports : allReports.filter(r => r.district.toLowerCase().includes(selected.toLowerCase()));
                
                filtered.forEach(report => {
                    const color = report.status === 'off' ? '#ef4444' : '#22c55e';
                    L.circleMarker([report.lat, report.lng], {
                        radius: 8, fillColor: color, color: '#fff', weight: 1, fillOpacity: 0.8
                    }).bindPopup(`<b>${report.district}</b><br>${report.status === 'off' ? 'কারেন্ট নাই' : 'কারেন্ট আছে'}`).addTo(markers);
                });
                
                const districtName = selected === 'all' ? 'সব জেলায়' : selected + ' জেলায়';
                statusDiv.innerText = `${districtName} লাস্ট ১ ঘন্টায় ${filtered.length} টা রিপোর্ট`;
            }
            
            setInterval(loadReports, 30000);
        });
    </script>
</body>
</html>
