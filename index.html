        /* প্রিমিয়াম বাটন */
.btn {
       padding: 14px 10px;
       font-size: 15px;
       border-radius: 12px;
       border: none;
       margin: 5px;
       width: 47%;
       font-weight: 600;
       cursor: pointer;
       transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
       position: relative;
       overflow: hidden;
       box-shadow: 0 4px 15px rgba(0,0,0,0.2);
       letter-spacing: 0.3px;
   }
   
.btn:hover {
       transform: translateY(-4px) scale(1.02);
       box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
   }
   
.btn:active {
       transform: translateY(-1px) scale(0.98);
       box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
   }
   
.btn::before {
       content: "";
       position: absolute;
       top: 0;
       left: -100%;
       width: 100%;
       height: 100%;
       background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
       transition: left 0.5s;
   }
   
.btn:hover::before {
       left: 100%;
   }
   
.btn::after {
       content: "";
       position: absolute;
       top: 50%;
       left: 50%;
       width: 0;
       height: 0;
       border-radius: 50%;
       background: rgba(255, 255, 255, 0.4);
       transform: translate(-50%, -50%);
       transition: width 0.6s, height 0.6s;
   }
   
.btn:active::after {
       width: 300px;
       height: 300px;
   }
   
.off {
       background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
       color: white;
       animation: pulse-red 2s infinite;
   }
   
   @keyframes pulse-red {
       0%, 100% { box-shadow: 0 4px 15px rgba(239, 68, 0.4), 0 0 0 0 rgba(239, 68, 68, 0.7); }
       50% { box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4), 0 0 0 12px rgba(239, 68, 68, 0); }
   }
   
.on {
       background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
       color: white;
   }
   
.on:hover {
       background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
   }
   
.manual {
       background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
       color: white;
       width: 96%;
       margin-top: 8px;
   }
   
.manual.active {
       background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
       animation: pulse-orange 1.5s infinite;
   }
   
   @keyframes pulse-orange {
       0%, 100% { box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4), 0 0 0 0 rgba(245, 158, 11, 0.7); }
       50% { box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4), 0 0 0 10px rgba(245, 158, 11, 0); }

                        if (tempMarker) map.removeLayer(tempMarker);
                        tempMarker = L.marker(selectedLatLng).addTo(map).bindPopup('এইখানে রিপোর্ট দিবা?').openPopup();
                        statusDiv.innerText = `লোকেশন সিলেক্ট: ${selectedLatLng.lat.toFixed(4)}, ${selectedLatLng.lng.toFixed(4)}`;
                    }
                });

                Object.keys(BD_DATA).sort().forEach(d => {
                    districtSelect.innerHTML += `<option value="${d}">${d}</option>`;
                });

                statusDiv.innerText = 'ম্যাপ রেডি ✅ জুম করে লোকেশন দেখো';
                loadReports();
            } catch (e) { statusDiv.innerText = 'ম্যাপ এরর: ' + e.message; return; }

            window.toggleManualMode = function() {
                manualMode =!manualMode;
                if (manualMode) {
                    manualBtn.classList.add('active');
                    manualBtn.innerText = '❌ ক্যানসেল করো';
                    manualInfo.style.display = 'block';
                    statusDiv.innerText = 'ম্যাপে ক্লিক করে লোকেশন সিলেক্ট করো';
                } else {
                    manualBtn.classList.remove('active');
                    manualBtn.innerText = '🗺️ ম্যাপে ক্লিক করে রিপোর্ট';
                    manualInfo.style.display = 'none';
                    selectedLatLng = null;
                    if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
                    statusDiv.innerText = 'ম্যানুয়াল মোড বন্ধ';
                }
            }

                        window.loadUpazilas = function() {
                const district = districtSelect.value;
                upazilaSelect.innerHTML = '<option value="all">সব উপজেলা</option>';
                upazilaSelect.disabled = district === 'all';

                if (district!== 'all' && BD_DATA[district]) {
                    Object.keys(BD_DATA[district].upazilas).forEach(upazila => {
                        upazilaSelect.innerHTML += `<option value="${upazila}">${upazila}</option>`;
                    });
                    map.setView(BD_DATA[district].center, 10);
                } else {
                    map.setView([23.685, 90.3563], 7);
                }
                filterReports();
            }

            window.filterReports = function() {
                const district = districtSelect.value;
                const upazila = upazilaSelect.value;
                markers.clearLayers();

                let filtered = allReports;

                if (district!== 'all') {
                    filtered = filtered.filter(r => {
                        if (!r.district) return false;
                        return r.district.toLowerCase().trim() === district.toLowerCase().trim();
                    });
                }

                if (upazila!== 'all') {
                    filtered = filtered.filter(r => {
                        if (!r.upazila) return false;
                        return r.upazila.toLowerCase().trim() === upazila.toLowerCase().trim();
                    });

                    if (district!== 'all' && BD_DATA[district]?.upazilas[upazila]) {
                        const coords = BD_DATA[district].upazilas[upazila];
                        map.setView(coords, 14);
                    }
                }

                filtered.forEach(report => {
                    if (!report.lat ||!report.lng) return;
                    const color = report.status === 'off'? '#ef4444' : '#22c55e';
                    L.circleMarker([report.lat, report.lng], {
                        radius: 8, fillColor: color, color: '#fff', weight: 1, fillOpacity: 0.8
                    }).bindPopup(`<b>${report.district}</b><br>${report.upazila}<br>${report.status === 'off'? 'কারেন্ট নাই' : 'কারেন্ট আছে'}<br><small>${new Date(report.created_at).toLocaleTimeString('bn-BD')}</small>`).addTo(markers);
                });

                let locationText = district === 'all'? 'সব জেলায়' : district;
                if (upazila!== 'all') locationText = upazila + ', ' + district;

                statusDiv.innerText = `${locationText} - লাস্ট ১ ঘন্টায় ${filtered.length} টা রিপোর্ট`;
            }

            async function getLocationFromCoords(lat, lng) {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=bn`);
                    const data = await response.json();
                    const addr = data.address;

                    let district = addr.county || addr.state_district || addr.city || 'Unknown';
                    district = district.replace(' District','').replace(' জেলা','').replace(' Sadar','').trim();

                    let upazila = addr.suburb || addr.town || addr.village || addr.neighbourhood || addr.city_district || 'Unknown';

                    return { district, upazila };
                } catch (e) {
                    return { district: 'Unknown', upazila: 'Unknown' };
                }
            }

            async function saveReport(status, lat, lng) {
                const { district, upazila } = await getLocationFromCoords(lat, lng);

                if (!bdBounds.contains([lat, lng])) {
                    statusDiv.innerText = 'দুঃখিত, শুধু বাংলাদেশের জন্য';
                    return;
                }

                statusDiv.innerText = `${upazila}, ${district} থেকে রিপোর্ট সেভ হচ্ছে...`;
                statusDiv.classList.add('loading');

                const { error } = await supabase.from('reports').insert([{
                    status: status, lat: lat, lng: lng, district: district, upazila: upazila
                }]);

                statusDiv.classList.remove('loading');

                if(error) {
                    statusDiv.innerText = 'DB এরর: ' + error.message;
                } else {
                    statusDiv.innerText = `${district} থেকে রিপোর্ট যোগ হয়েছে ✅`;
                    if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
                    manualMode = false;
                    manualBtn.classList.remove('active');
                    manualBtn.innerText = '🗺️ ম্যাপে ক্লিক করে রিপোর্ট👈';
                    manualInfo.style.display = 'none';
                    selectedLatLng = null;
                    loadReports();
                }
            }

            window.reportLoadShedding = async function(status) {
                if (manualMode && selectedLatLng) {
                    await saveReport(status, selectedLatLng.lat, selectedLatLng.lng);
                } else {
                    statusDiv.innerText = 'লোকেশন খুঁজতেছি';
                    statusDiv.classList.add('loading');
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        statusDiv.classList.remove('loading');
                        await saveReport(status, pos.coords.latitude, pos.coords.longitude);
                    }, (err) => {
                        statusDiv.classList.remove('loading');
                        if(err.code == 1) statusDiv.innerText = 'লোকেশন ব্লক। ম্যানুয়াল মোড ইউজ করো ⬇️';
                        else if(err.code == 2) statusDiv.innerText = 'GPS পাচ্ছে না। ম্যানুয়াল মোড ইউজ করো ⬇️';
                        else statusDiv.innerText = 'লোকেশন এরর। ম্যানুয়াল মোড ইউজ করো ⬇️';
                    }, {enableHighAccuracy: true, timeout: 10000});
                }
            }

            async function loadReports() {
                const { data, error } = await supabase.from('reports').select('*').gte('created_at', new Date(Date.now() - 60*60*1000).toISOString());
                if(error) { statusDiv.innerText = 'DB Read এরর: ' + error.message; return; }
                allReports = data;
                filterReports();
            }

            setInterval(loadReports, 30000);
        });
    </script>
</body>
</html>
