<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলাদেশ লোডশেডিং ম্যাপ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {margin:0; font-family: Arial; background:#0f172a;}
#map {height:50vh;}

.controls {padding:10px; text-align:center; background:#1e293b;}
h2 {color:white;}

.btn {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:14px;
  width:45%;
  font-weight:bold;
}

.off {background:#ef4444; color:white;}
.on {background:#22c55e; color:white;}
.manual {background:#3b82f6; color:white; width:90%;}

#status {color:#fbbf24; font-size:12px;}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
<h2>⚡ লোডশেডিং ম্যাপ</h2>

<button class="btn off" onclick="report('off')">❌ কারেন্ট নাই 👆</button>
<button class="btn on" onclick="report('on')">✅ কারেন্ট আছে 👆</button>

<br>

<button class="btn manual" onclick="toggleManual()">🗺️ ম্যাপে ক্লিক করে রিপোর্ট</button>

<div id="status">Ready...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://irwvbnlorfxuzhomcyew.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlyd3ZibmxvcmZ4dXpob21jeWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDAyMDMsImV4cCI6MjA5MzE3NjIwM30.4MvaM2e_KgdSu_WfQ_lwSxkBkYiXZv7c1B0NWkbEup8";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const map = L.map('map').setView([23.8, 90.4], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = L.layerGroup().addTo(map);
let manualMode = false;
let selected = null;

map.on('click', e => {
  if(manualMode){
    selected = e.latlng;
    alert("লোকেশন সিলেক্ট হয়েছে 👆");
  }
});

async function load(){
  const {data} = await supabase
    .from('reports')
    .select('*')
    .gte('created_at', new Date(Date.now()-3600000).toISOString());

  markers.clearLayers();

  data.forEach(r=>{
    let color = r.status === 'off' ? 'red':'green';

    L.circleMarker([r.lat,r.lng],{
      color:color,
      radius:8
    }).addTo(markers)
    .bindPopup(r.status === 'off' ? 'কারেন্ট নাই' : 'কারেন্ট আছে');
  });
}

async function report(status){
  document.getElementById('status').innerText = "লোকেশন নিচ্ছে...";

  if(manualMode && selected){
    await save(status, selected.lat, selected.lng);
  } else {
    navigator.geolocation.getCurrentPosition(async pos=>{
      await save(status, pos.coords.latitude, pos.coords.longitude);
    });
  }
}

async function save(status, lat, lng){
  const {error} = await supabase.from('reports').insert([{
    lat, lng, status
  }]);

  if(error){
    document.getElementById('status').innerText = error.message;
  } else {
    document.getElementById('status').innerText = "রিপোর্ট সফল ✅";
    load();
  }
}

function toggleManual(){
  manualMode = !manualMode;
  document.getElementById('status').innerText =
    manualMode ? "ম্যাপে ক্লিক করো 👆" : "ম্যানুয়াল বন্ধ";
}

setInterval(load, 30000);
load();
</script>

</body>
</html>
